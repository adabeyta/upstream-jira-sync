name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test at the tagged ref
        run: |
          pip install -e ".[dev,vertex]"
          python -m pytest tests/ -q

      - name: Version consistency
        run: |
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "v$PKG_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "pyproject version v$PKG_VERSION does not match tag $GITHUB_REF_NAME" >&2
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag

      # Deployment repos may track the floating major tag (e.g. @v1) for
      # automatic compatible upgrades, or pin exact tags for full control.
      # Pre-1.0 the major tag is v0 and minor bumps may break; pin exact tags
      # until v1.0.0.
      - name: Move floating major tag
        run: |
          MAJOR="${GITHUB_REF_NAME%%.*}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$MAJOR" "$GITHUB_REF_NAME"
          git push -f origin "$MAJOR"
